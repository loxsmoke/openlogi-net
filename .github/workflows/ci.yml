name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # Windows runner because the projects target net10.0-windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore OpenLogi.slnx

      - name: Build
        run: dotnet build OpenLogi.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OpenLogi.slnx --configuration Release --no-build --verbosity normal
